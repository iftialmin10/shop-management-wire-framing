<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Client</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f0fdf4, #e0f2fe);
      }

      .form-card {
        max-width: 760px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card form-card p-4 p-md-5">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                  <h1 class="h2 fw-bold mb-1">New Client</h1>
                  <p class="text-muted mb-0">Enter the client details below.</p>
                </div>
                <a href="../dashboard/dashboard.html" class="btn btn-outline-secondary">
                  Back
                </a>
              </div>

              <form id="client-form" action="client-history.html">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label for="phone" class="form-label">Phone</label>
                  <input
                    type="tel"
                    class="form-control form-control-lg"
                    id="phone"
                    placeholder="Enter phone number"
                    value="01999999"
                  />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="name" class="form-label">Name</label>
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    id="name"
                    placeholder="Enter client name"
                    value="Abdul motin"
                  />
                  </div>

                  <div class="col-12">
                    <label for="address" class="form-label">Address</label>
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    id="address"
                    placeholder="Enter client address"
                    value="Rampura"
                  />
                  </div>

                  <div class="col-12">
                    <label for="reference" class="form-label">Reference</label>
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    id="reference"
                    placeholder="Enter reference details"
                    value="Walk-in client"
                  />
                  </div>
                </div>

                <div class="d-flex gap-3 mt-4">
                  <button type="submit" class="btn btn-primary btn-lg">
                    Save Client
                  </button>
                  <button type="reset" class="btn btn-outline-secondary btn-lg">
                    Reset
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const clientForm = document.getElementById("client-form");

      clientForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const clientData = {
          phone: document.getElementById("phone").value,
          name: document.getElementById("name").value,
          address: document.getElementById("address").value,
          reference: document.getElementById("reference").value,
        };

        localStorage.setItem("shopClientData", JSON.stringify(clientData));
        window.location.href = clientForm.action;
      });
    </script>
  </body>
</html>
