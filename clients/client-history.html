<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client History</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #e0f2fe);
      }

      .history-card {
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.1);
      }

      .client-row {
        cursor: pointer;
      }

      .client-row:hover {
        background: #eff6ff;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="card history-card p-4 p-md-5">
        <div class="card-body">
          <div class="d-flex justify-content-end gap-2 mb-3">
            <button
              type="button"
              class="btn btn-primary"
              onclick="window.location.href = 'new-client.html'"
            >
              New Client
            </button>
            <button
              type="button"
              class="btn btn-outline-secondary"
              onclick="window.location.href = '../dashboard/dashboard.html'"
            >
              Back
            </button>
          </div>

          <div
            class="d-flex flex-column flex-lg-row align-items-lg-center gap-3 mb-4"
          >
            <div class="flex-grow-1">
              <label for="search-client" class="form-label">Search</label>
              <input
                type="search"
                class="form-control"
                id="search-client"
                placeholder="Search by phone or name"
              />
            </div>
            <div class="text-center px-lg-3">
              <h1 class="h2 fw-bold mb-0">Client History</h1>
            </div>
            <div class="flex-grow-1">
              <label for="sort-client" class="form-label">Sort</label>
              <select class="form-select" id="sort-client">
                <option>ID</option>
                <option>Name</option>
                <option>Phone</option>
                <option>Address</option>
                <option>Reference</option>
              </select>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-striped table-bordered align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Phone</th>
                  <th>Name</th>
                  <th>Address</th>
                  <th>Reference</th>
                </tr>
              </thead>
              <tbody>
                <tr
                  class="client-row"
                  onclick="window.location.href = 'client-summary.html'"
                >
                  <td>001</td>
                  <td>01999999</td>
                  <td>Abdul Motin</td>
                  <td>Rampura</td>
                  <td>Mia, Kazipara</td>
                </tr>
                <tr
                  class="client-row"
                  onclick="window.location.href = 'client-summary.html'"
                >
                  <td>002</td>
                  <td>01888888</td>
                  <td>Rahim Uddin</td>
                  <td>Badda</td>
                  <td>Hasan, Badda</td>
                </tr>
                <tr
                  class="client-row"
                  onclick="window.location.href = 'client-summary.html'"
                >
                  <td>003</td>
                  <td>01777777</td>
                  <td>Karim Hasan</td>
                  <td>Malibagh</td>
                  <td>Jamal, Malibagh</td>
                </tr>
                <tr
                  class="client-row"
                  onclick="window.location.href = 'client-summary.html'"
                >
                  <td>004</td>
                  <td>01666666</td>
                  <td>Salma Begum</td>
                  <td>Khilgaon</td>
                  <td>Rafiq, Khilgaon</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const goBackToDashboard = () => {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }

        window.location.href = "../dashboard/dashboard.html";
      };
    </script>
  </body>
</html>
