<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Backup</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #eff6ff, #f8fafc);
      }

      .backup-card {
        max-width: 680px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card backup-card p-4 p-md-5">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2 fw-bold mb-0">Data Backup</h1>
                <a href="advanced-settings.html" class="btn btn-outline-secondary">
                  Back
                </a>
              </div>

              <div class="mb-4">
                <p class="text-muted mb-2">Backup file</p>
                <p class="h5 fw-bold mb-0">shop-management-backup.json</p>
              </div>

              <div class="mb-4">
                <p class="text-muted mb-2">Backup includes</p>
                <div class="d-flex flex-wrap gap-2">
                  <span class="badge text-bg-light">Clients</span>
                  <span class="badge text-bg-light">Transactions</span>
                  <span class="badge text-bg-light">Stock</span>
                  <span class="badge text-bg-light">Settings</span>
                </div>
              </div>

              <div class="text-end">
                <button type="button" class="btn btn-primary">
                  Download Backup
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
