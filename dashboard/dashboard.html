<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop Management Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #eff6ff, #fef3c7);
      }

      .dashboard-card {
        max-width: 680px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
        position: relative;
      }

      .settings-btn {
        position: absolute;
        right: 1.5rem;
        bottom: 1.5rem;
        min-height: 2.75rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card dashboard-card p-4 p-md-5">
            <div class="card-body text-center pb-5">
              <h1 class="h2 fw-bold mb-2">Shop Management</h1>
              <p class="text-muted mb-5">
                Choose an option to continue after signing in.
              </p>

              <div class="d-grid gap-3">
                <a href="../clients/new-client.html" class="btn btn-primary btn-lg">
                  New Client
                </a>
                <a href="../clients/client-history.html" class="btn btn-outline-primary btn-lg">
                  Client History
                </a>
                <a href="../products/product-details.html" class="btn btn-dark btn-lg">
                  Product Details
                </a>
              </div>
              <a
                href="advanced-settings/advanced-settings.html"
                class="btn btn-outline-dark settings-btn"
                aria-label="Advanced settings"
                title="Advanced settings"
              >
                <span aria-hidden="true">&#9881;</span>
                <span>settings</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
