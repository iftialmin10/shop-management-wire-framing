<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop Management Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8f4ea, #dbeafe);
      }

      .login-card {
        max-width: 420px;
        width: 100%;
        border: 0;
        border-radius: 1rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
      }

      .brand-badge {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #0d6efd;
        color: #fff;
        font-weight: 700;
        font-size: 1.25rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card login-card p-4 p-md-5">
            <div class="card-body">
              <div class="d-flex justify-content-center mb-4">
                <div class="brand-badge">SM</div>
              </div>
              <div class="text-center mb-4">
                <h1 class="h3 fw-bold mb-2">Shop Management</h1>
                <p class="text-muted mb-0">Sign in to access your dashboard</p>
              </div>

              <form action="dashboard/dashboard.html">
                <div class="mb-3">
                  <label for="username" class="form-label">Username</label>
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    id="username"
                    placeholder="Enter your username"
                  />
                </div>

                <div class="mb-4">
                  <label for="password" class="form-label">Password</label>
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    id="password"
                    placeholder="Enter your password"
                  />
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-primary btn-lg">
                    Login
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
