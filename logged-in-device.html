<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logged In Device</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #eff6ff, #f8fafc);
      }

      .device-card {
        max-width: 820px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card device-card p-4 p-md-5">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2 fw-bold mb-0">Logged In Device</h1>
                <a href="advanced-settings.html" class="btn btn-outline-secondary">
                  Back
                </a>
              </div>

              <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>Device Name</th>
                      <th>Location</th>
                      <th>Last Active</th>
                      <th>Status</th>
                      <th>Remove</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>Windows Laptop</td>
                      <td>Dhaka</td>
                      <td>Today</td>
                      <td>Active</td>
                      <td>
                        <button type="button" class="btn btn-sm btn-outline-danger">
                          Remove
                        </button>
                      </td>
                    </tr>
                    <tr>
                      <td>Android Phone</td>
                      <td>Dhaka</td>
                      <td>Yesterday</td>
                      <td>Logged in</td>
                      <td>
                        <button type="button" class="btn btn-sm btn-outline-danger">
                          Remove
                        </button>
                      </td>
                    </tr>
                    <tr>
                      <td>Office Desktop</td>
                      <td>Bhola</td>
                      <td>12/12/25</td>
                      <td>Logged in</td>
                      <td>
                        <button type="button" class="btn btn-sm btn-outline-danger">
                          Remove
                        </button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
