<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Selection</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #ede9fe);
      }

      .selection-card {
        max-width: 720px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card selection-card p-4 p-md-5">
            <div class="card-body text-center">
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <div class="text-start">
                  <h1 class="h2 fw-bold mb-1">Product selection</h1>
                  <p class="text-muted mb-0">
                    Choose a product to enter purchase information.
                  </p>
                </div>
                <a href="client-summary.html" class="btn btn-outline-secondary">
                  Back
                </a>
              </div>

              <div class="d-grid gap-3 mt-4">
                <a href="rod-selection.html" class="btn btn-primary btn-lg">
                  Rod
                </a>
                <a href="cement-selection.html" class="btn btn-success btn-lg">
                  Cement
                </a>
                <a href="other-expense.html" class="btn btn-warning btn-lg">
                  Other Expense
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const redirectToCashMemo = (data) => {
        localStorage.setItem("shopProductData", JSON.stringify(data));
        window.location.href = "cash-memo.html";
      };
    </script>
  </body>
</html>
