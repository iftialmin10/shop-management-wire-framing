<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Misc Payment to Client</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #fff7ed);
      }

      .payment-card {
        max-width: 720px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card payment-card p-4 p-md-5">
            <div class="card-body">
              <div class="mb-4">
                <h1 class="h2 fw-bold mb-1">Misc Payment to Client</h1>
                <p class="text-muted mb-0">Enter payment details below.</p>
              </div>

              <form id="misc-payment-form">
                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label for="payment-date" class="form-label">Date</label>
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="payment-date"
                      value="10/12/25"
                    />
                  </div>

                  <div class="col-12 col-md-4">
                    <label for="payment-description" class="form-label">
                      Description
                    </label>
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="payment-description"
                      value="ByCash"
                    />
                  </div>

                  <div class="col-12 col-md-4">
                    <label for="payment-take" class="form-label">Take</label>
                    <input
                      type="number"
                      class="form-control form-control-lg"
                      id="payment-take"
                      value="3000"
                    />
                  </div>
                </div>

                <div class="d-flex justify-content-end align-items-center gap-2 mt-4">
                  <button
                    type="button"
                    class="btn btn-outline-secondary btn-lg"
                    onclick="window.location.href = '../clients/client-summary.html'"
                  >
                    Cancel
                  </button>
                  <button type="submit" class="btn btn-warning btn-lg">
                    Save
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      document
        .getElementById("misc-payment-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();
          window.location.href = "../clients/client-summary.html";
        });
    </script>
  </body>
</html>
