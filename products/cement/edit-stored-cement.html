<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Stored Cement</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #dcfce7);
      }

      .edit-card {
        max-width: 720px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.1);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card edit-card p-4 p-md-5">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2 fw-bold mb-0">Edit stored cement</h1>
                <a href="cement-stock.html" class="btn btn-outline-secondary">
                  Back
                </a>
              </div>

              <form id="edit-stored-cement-form">
                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label for="stored-date" class="form-label">Date</label>
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="stored-date"
                      value="13/12/25"
                    />
                  </div>
                  <div class="col-12 col-md-4">
                    <label class="form-label" for="stored-status">Status</label>
                    <span class="form-control form-control-lg" id="stored-status">
                      load
                    </span>
                  </div>
                  <div class="col-12 col-md-4">
                    <label for="stored-remaining" class="form-label">
                      Remaining
                    </label>
                    <input
                      type="number"
                      class="form-control form-control-lg"
                      id="stored-remaining"
                      value="500"
                    />
                  </div>
                </div>

                <div class="d-flex justify-content-end align-items-center gap-2 mt-4">
                  <button
                    type="button"
                    class="btn btn-outline-danger btn-lg"
                    onclick="window.location.href = 'cement-stock.html'"
                  >
                    Delete
                  </button>
                  <button type="submit" class="btn btn-success btn-lg">
                    Save
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      document
        .getElementById("edit-stored-cement-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();
          window.location.href = "cement-stock.html";
        });
    </script>
  </body>
</html>
