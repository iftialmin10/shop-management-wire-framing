<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cement Stock</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #dcfce7);
      }

      .stock-card {
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.1);
      }

      .info-box {
        border: 1px solid #bbf7d0;
        border-radius: 1rem;
        background: #f0fdf4;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="card stock-card p-4 p-md-5">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div style="width: 80px"></div>
            <h1 class="h2 fw-bold mb-0 text-center">BM (seven-rings)</h1>
            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-outline-primary"
                onclick="window.print()"
              >
                Print
              </button>
              <a href="cement-details.html" class="btn btn-outline-secondary">Back</a>
            </div>
          </div>

          <div class="row g-3 align-items-stretch mb-4">
            <div class="col-12 col-md-6">
              <div
                class="info-box p-3 h-100 d-flex align-items-center justify-content-center"
              >
                <p class="h5 fw-bold mb-0">Total Remaining Stock: 650</p>
              </div>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Quantity</th>
                  <th>Edit</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>13/12/25</td>
                  <td>load</td>
                  <td>500</td>
                  <td>
                    <button
                      type="button"
                      class="btn btn-sm btn-outline-secondary"
                      onclick="window.location.href = 'edit-stored-cement.html'"
                    >
                      Edit
                    </button>
                  </td>
                </tr>
                <tr>
                  <td>14/12/25</td>
                  <td>sell</td>
                  <td>200</td>
                  <td></td>
                </tr>
                <tr>
                  <td>15/12/25</td>
                  <td>load</td>
                  <td>300</td>
                  <td>
                    <button
                      type="button"
                      class="btn btn-sm btn-outline-secondary"
                      onclick="window.location.href = 'edit-stored-cement.html'"
                    >
                      Edit
                    </button>
                  </td>
                </tr>
                <tr>
                  <td>16/12/25</td>
                  <td>sell</td>
                  <td>150</td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
