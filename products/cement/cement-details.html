<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cement Store Details</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #ede9fe);
      }

      .cement-card {
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.1);
      }

      .selectable-row {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="card cement-card p-4 p-md-5">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2 fw-bold mb-0">Cement Store Details</h1>
            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-success"
                onclick="window.location.href = 'load-cement.html'"
              >
                Load Cement
              </button>
              <button
                type="button"
                class="btn btn-outline-success"
                onclick="window.print()"
              >
                Print
              </button>
              <a href="../product-details.html" class="btn btn-outline-secondary">
                Back
              </a>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Brand-Name</th>
                  <th>Categories</th>
                  <th>Current amount (Bags)</th>
                </tr>
              </thead>
              <tbody>
                <tr
                  class="selectable-row"
                  onclick="window.location.href = 'cement-stock.html'"
                >
                  <td>SevenRings</td>
                  <td>BM</td>
                  <td>300</td>
                </tr>
                <tr
                  class="selectable-row"
                  onclick="window.location.href = 'cement-stock.html'"
                >
                  <td>SevenRings</td>
                  <td>AM</td>
                  <td>500</td>
                </tr>
                <tr
                  class="selectable-row"
                  onclick="window.location.href = 'cement-stock.html'"
                >
                  <td>SevenRings</td>
                  <td>OPC</td>
                  <td>600</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
