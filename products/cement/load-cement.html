<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Load Cement</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #ede9fe);
      }

      .load-cement-card {
        max-width: 760px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.1);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card load-cement-card p-4 p-md-5">
            <div class="card-body">
              <div class="mb-4">
                <h1 class="h2 fw-bold mb-1">Load Cement</h1>
                <p class="text-muted mb-0">Enter loaded cement details.</p>
              </div>

              <form id="load-cement-form">
                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label for="cement-brand" class="form-label">Brand-name</label>
                    <select class="form-select form-select-lg" id="cement-brand">
                      <option selected>Seven-Rings</option>
                    </select>
                  </div>
                  <div class="col-12 col-md-4">
                    <label for="cement-category" class="form-label">
                      Categories
                    </label>
                    <select class="form-select form-select-lg" id="cement-category">
                      <option selected>BM</option>
                      <option>AM</option>
                      <option>OPC</option>
                    </select>
                  </div>
                  <div class="col-12 col-md-4">
                    <label for="load-amount" class="form-label">Load amount</label>
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="load-amount"
                      value="200"
                    />
                  </div>
                </div>

                <div class="d-flex justify-content-end align-items-center gap-2 mt-4">
                  <button
                    type="button"
                    class="btn btn-outline-secondary btn-lg"
                    onclick="window.location.href = 'cement-details.html'"
                  >
                    Cancel
                  </button>
                  <button type="submit" class="btn btn-success btn-lg">
                    Save
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      document
        .getElementById("load-cement-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();
          window.location.href = "cement-details.html";
        });
    </script>
  </body>
</html>
