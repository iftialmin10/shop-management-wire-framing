<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cement Selection</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #dcfce7);
      }

      .selection-card {
        max-width: 840px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.1);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card selection-card p-4 p-md-5">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <div>
                  <h1 class="h2 fw-bold mb-1">Cement Selection</h1>
                  <p class="text-muted mb-0">
                    Enter cement purchase information.
                  </p>
                </div>
                <a
                  href="../product-selection.html"
                  class="btn btn-outline-secondary"
                >
                  Back
                </a>
              </div>

              <form id="cement-selection-form">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label for="cement-brand" class="form-label">
                      CementBrand
                    </label>
                    <input
                      type="text"
                      class="form-control"
                      id="cement-brand"
                      value="SevenRings"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="price-packet" class="form-label">
                      price/packet
                    </label>
                    <input
                      type="number"
                      class="form-control"
                      id="price-packet"
                      value="300"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="cement-category" class="form-label">
                      Cement category
                    </label>
                    <input
                      type="text"
                      class="form-control"
                      id="cement-category"
                      value="BM"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="total-cement-bag" class="form-label">
                      Total cement bag
                    </label>
                    <input
                      type="number"
                      class="form-control"
                      id="total-cement-bag"
                      value="20"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="total-price" class="form-label">
                      Total price
                    </label>
                    <input
                      type="number"
                      class="form-control"
                      id="total-price"
                      value="600"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="other-expense" class="form-label">
                      other expense
                    </label>
                    <input
                      type="text"
                      class="form-control"
                      id="other-expense"
                      value="Carrying"
                    />
                  </div>
                  <div class="col-12">
                    <label for="cost" class="form-label">cost</label>
                    <input
                      type="number"
                      class="form-control"
                      id="cost"
                      value="200"
                    />
                  </div>
                </div>

                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label for="cement-brand" class="form-label">
                      CementBrand
                    </label>
                    <input
                      type="text"
                      class="form-control"
                      id="cement-brand"
                      value="SevenRings"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="price-packet" class="form-label">
                      price/packet
                    </label>
                    <input
                      type="number"
                      class="form-control"
                      id="price-packet"
                      value="300"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="cement-category" class="form-label">
                      Cement category
                    </label>
                    <input
                      type="text"
                      class="form-control"
                      id="cement-category"
                      value="BM"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="total-cement-bag" class="form-label">
                      Total cement bag
                    </label>
                    <input
                      type="number"
                      class="form-control"
                      id="total-cement-bag"
                      value="20"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="total-price" class="form-label">
                      Total price
                    </label>
                    <input
                      type="number"
                      class="form-control"
                      id="total-price"
                      value="600"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="other-expense" class="form-label">
                      other expense
                    </label>
                    <input
                      type="text"
                      class="form-control"
                      id="other-expense"
                      value="Carrying"
                    />
                  </div>
                  <div class="col-12">
                    <label for="cost" class="form-label">cost</label>
                    <input
                      type="number"
                      class="form-control"
                      id="cost"
                      value="200"
                    />
                  </div>
                </div>

                <div class="mt-4">
                  <button type="button" class="btn btn-outline-success">
                    Add More
                  </button>
                </div>

                <div class="text-end mt-4">
                  <button type="submit" class="btn btn-success">Save</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      document
        .getElementById("cement-selection-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();
          window.location.href = "../../clients/client-summary.html";
        });
    </script>
  </body>
</html>
