<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Cement</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #dcfce7);
      }

      .add-cement-card {
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.1);
      }

      .cement-row {
        border: 1px solid #bbf7d0;
        border-radius: 1rem;
        background: #f0fdf4;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="card add-cement-card p-4 p-md-5">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
              <h1 class="h2 fw-bold mb-1">Add Cement</h1>
              <p class="text-muted mb-0">Enter one or more cement entries.</p>
            </div>
            <a href="cement-details.html" class="btn btn-outline-secondary">Back</a>
          </div>

          <form id="add-cement-form">
            <div id="cement-rows" class="d-grid gap-3">
              <div class="cement-row p-3">
                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label class="form-label" for="brand-name-1">Brand-Name</label>
                    <input
                      type="text"
                      class="form-control"
                      id="brand-name-1"
                      placeholder="Enter brand name"
                      value="Seven Rings"
                    />
                  </div>
                  <div class="col-12 col-md-4">
                    <label class="form-label" for="categories-1">Categories</label>
                    <input
                      type="text"
                      class="form-control"
                      id="categories-1"
                      placeholder="Enter category"
                      value="BM"
                    />
                  </div>
                  <div class="col-12 col-md-4">
                    <label class="form-label" for="amount-1">Amount</label>
                    <input
                      type="number"
                      class="form-control"
                      id="amount-1"
                      placeholder="Enter amount"
                      value="400"
                    />
                  </div>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4">
              <button type="button" id="add-more-cement-btn" class="btn btn-outline-success">
                Add more
              </button>
              <button type="submit" class="btn btn-success">Save</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const cementRows = document.getElementById("cement-rows");
      const addMoreCementButton = document.getElementById("add-more-cement-btn");
      const dummyRows = [
        { brand: "Seven Rings", category: "AM", amount: "500" },
        { brand: "Seven Rings", category: "OPC", amount: "700" },
        { brand: "Premier", category: "OPC", amount: "450" },
      ];
      let rowCount = 1;

      addMoreCementButton.addEventListener("click", () => {
        rowCount += 1;
        const dummyValue = dummyRows[(rowCount - 2) % dummyRows.length];

        const row = document.createElement("div");
        row.className = "cement-row p-3";
        row.innerHTML = `
          <div class="row g-3">
            <div class="col-12 col-md-4">
              <label class="form-label" for="brand-name-${rowCount}">Brand-Name</label>
              <input
                type="text"
                class="form-control"
                id="brand-name-${rowCount}"
                placeholder="Enter brand name"
                value="${dummyValue.brand}"
              />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label" for="categories-${rowCount}">Categories</label>
              <input
                type="text"
                class="form-control"
                id="categories-${rowCount}"
                placeholder="Enter category"
                value="${dummyValue.category}"
              />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label" for="amount-${rowCount}">Amount</label>
              <input
                type="number"
                class="form-control"
                id="amount-${rowCount}"
                placeholder="Enter amount"
                value="${dummyValue.amount}"
              />
            </div>
          </div>
        `;

        cementRows.appendChild(row);
      });

      document
        .getElementById("add-cement-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();
          window.location.href = "cement-details.html";
        });
    </script>
  </body>
</html>
