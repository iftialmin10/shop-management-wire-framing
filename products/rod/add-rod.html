<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Rod</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #e0f2fe);
      }

      .add-rod-card {
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.1);
      }

      .rod-row {
        border: 1px solid #dbeafe;
        border-radius: 1rem;
        background: #f8fbff;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="card add-rod-card p-4 p-md-5">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
              <h1 class="h2 fw-bold mb-1">Add Rod</h1>
              <p class="text-muted mb-0">Enter one or more rod entries.</p>
            </div>
            <a href="rod-details.html" class="btn btn-outline-secondary">Back</a>
          </div>

          <form id="add-rod-form">
            <div id="rod-rows" class="d-grid gap-3">
              <div class="rod-row p-3">
                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label class="form-label" for="rod-brand-1">rod-brand</label>
                    <input
                      type="text"
                      class="form-control"
                      id="rod-brand-1"
                      placeholder="Enter rod brand"
                      value="BSRM"
                    />
                  </div>
                  <div class="col-12 col-md-4">
                    <label class="form-label" for="rod-size-1">rod-size</label>
                    <input
                      type="text"
                      class="form-control"
                      id="rod-size-1"
                      placeholder="Enter rod size"
                      value="16 mm"
                    />
                  </div>
                  <div class="col-12 col-md-4">
                    <label class="form-label" for="rod-weight-1">rod-weight</label>
                    <input
                      type="number"
                      class="form-control"
                      id="rod-weight-1"
                      placeholder="Enter rod weight"
                      value="900"
                    />
                  </div>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4">
              <button type="button" id="add-more-btn" class="btn btn-outline-primary">
                Add more
              </button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const rodRows = document.getElementById("rod-rows");
      const addMoreButton = document.getElementById("add-more-btn");
      const dummyRows = [
        { brand: "AKS", size: "12 mm", weight: "700" },
        { brand: "KSRM", size: "10 mm", weight: "500" },
        { brand: "GPH", size: "20 mm", weight: "650" },
      ];
      let rowCount = 1;

      addMoreButton.addEventListener("click", () => {
        rowCount += 1;
        const dummyValue =
          dummyRows[(rowCount - 2) % dummyRows.length];

        const row = document.createElement("div");
        row.className = "rod-row p-3";
        row.innerHTML = `
          <div class="row g-3">
            <div class="col-12 col-md-4">
              <label class="form-label" for="rod-brand-${rowCount}">rod-brand</label>
              <input
                type="text"
                class="form-control"
                id="rod-brand-${rowCount}"
                placeholder="Enter rod brand"
                value="${dummyValue.brand}"
              />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label" for="rod-size-${rowCount}">rod-size</label>
              <input
                type="text"
                class="form-control"
                id="rod-size-${rowCount}"
                placeholder="Enter rod size"
                value="${dummyValue.size}"
              />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label" for="rod-weight-${rowCount}">rod-weight</label>
              <input
                type="number"
                class="form-control"
                id="rod-weight-${rowCount}"
                placeholder="Enter rod weight"
                value="${dummyValue.weight}"
              />
            </div>
          </div>
        `;

        rodRows.appendChild(row);
      });

      document
        .getElementById("add-rod-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();
          window.location.href = "rod-details.html";
        });
    </script>
  </body>
</html>
