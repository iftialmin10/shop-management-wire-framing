<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rod Store Details</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #e0f2fe);
      }

      .rod-card {
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.1);
      }

      .selectable-row {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="card rod-card p-4 p-md-5">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2 fw-bold mb-0">Rod Store Details</h1>
            <div class="d-flex gap-2">

              <a href="../product-details.html" class="btn btn-outline-secondary">

            </div>
          </div>

                  <th>Remaining Weight</th>
                  <th>Add rod</th>
                </tr>
              </thead>
              <tbody>
                <tr
                  class="selectable-row"
                  onclick="window.location.href = 'rod-stock.html'"
                >
                  <td>
                    <select
                      class="form-select form-select-sm"
                      onclick="event.stopPropagation()"

                      <option>8mm</option>
                      <option>10mm</option>
                      <option selected>12mm</option>

                    </select>
                  </td>
                  <td>
                    <select
                      class="form-select form-select-sm"
                      onclick="event.stopPropagation()"
                    >
                      <option selected>BSRM</option>
                      <option>KSRM</option>
                      <option>AKS</option>
                    </select>
                  </td>
                  <td>900kg</td>
                  <td>
                    <a
                      href="add-rod.html"
                      class="btn btn-sm btn-primary"
                      onclick="event.stopPropagation()"
