<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rod Selection</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #e0f2fe);
      }

      .selection-card {
        max-width: 840px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.1);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card selection-card p-4 p-md-5">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                  <h1 class="h2 fw-bold mb-1">Rod Selection</h1>
                  <p class="text-muted mb-0">Enter rod purchase information.</p>
                </div>
                <a href="../product-selection.html" class="btn btn-outline-secondary">
                  Back
                </a>
              </div>

              <form id="rod-selection-form">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label for="r-brand" class="form-label">R-brand</label>
                    <input
                      type="text"
                      class="form-control"
                      id="r-brand"
                      value="BSRM"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="r-size" class="form-label">R-size</label>
                    <input
                      type="text"
                      class="form-control"
                      id="r-size"
                      value="16mili"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="price-kg" class="form-label">Price/Kg</label>
                    <input
                      type="number"
                      class="form-control"
                      id="price-kg"
                      value="300"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="total-weight" class="form-label">
                      Total weight
                    </label>
                    <input
                      type="number"
                      class="form-control"
                      id="total-weight"
                      value="3000"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="total-cost" class="form-label">total cost</label>
                    <input
                      type="number"
                      class="form-control"
                      id="total-cost"
                      value="3000"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="other-expense" class="form-label">
                      Other expense
                    </label>
                    <input
                      type="text"
                      class="form-control"
                      id="other-expense"
                      value="Carrying"
                    />
                  </div>
                  <div class="col-12">
                    <label for="cost" class="form-label">Other expense cost</label>
                    <input
                      type="number"
                      class="form-control"
                      id="cost"
                      value="400"
                    />
                  </div>
                </div>

                <div class="text-end mt-4">
                  <button type="submit" class="btn btn-primary">Save</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      document
        .getElementById("rod-selection-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();
          window.location.href = "../../clients/client-summary.html";
        });
    </script>
  </body>
</html>
