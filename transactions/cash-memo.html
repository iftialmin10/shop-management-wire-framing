<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cash Memo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: #f8fafc;
      }

      .memo-card {
        max-width: 900px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.08);
      }

      .memo-title {
        letter-spacing: 0.12rem;
      }

      .info-box {
        background: #f8fafc;
        border: 1px solid #dbeafe;
        border-radius: 0.75rem;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="d-flex justify-content-center">
        <div class="card memo-card p-4 p-md-5">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div>
                <p class="text-primary fw-semibold mb-1">Shop Management</p>
                <h1 class="h2 fw-bold memo-title mb-0">CASH MEMO</h1>
              </div>
              <a href="../clients/client-summary.html" class="btn btn-outline-secondary">
                Back
              </a>
            </div>

            <div class="row g-3 mb-4">
              <div class="col-12 col-md-6">
                <div class="info-box p-3">
                  <strong>Name:</strong> <span id="memo-name">Taleb</span>
                </div>
              </div>
              <div class="col-12 col-md-6">
                <div class="info-box p-3">
                  <strong>Phone:</strong> <span id="memo-phone">0199999</span>
                </div>
              </div>
              <div class="col-12 col-md-8">
                <div class="info-box p-3">
                  <strong>Address:</strong> <span id="memo-address">Bhola</span>
                </div>
              </div>
              <div class="col-12 col-md-4">
                <div class="info-box p-3">
                  <strong>Date:</strong> <span id="memo-date">15/12/25</span>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <button
                type="button"
                class="btn btn-outline-primary"
                onclick="window.print()"
              >
                Print
              </button>
            </div>

            <div class="table-responsive mb-4">
              <table class="table table-bordered align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Cost/Unit</th>
                    <th>Total Cost</th>
                  </tr>
                </thead>
                <tbody id="memo-items">
                  <tr>
                    <td>past due</td>
                    <td></td>
                    <td></td>
                    <td>18500</td>
                  </tr>
                  <tr>
                    <td>Cement</td>
                    <td>50 bag</td>
                    <td>34</td>
                    <td>1700</td>
                  </tr>
                  <tr>
                    <td></td>
                    <td></td>
                    <td class="fw-bold">Total Due</td>
                    <td class="fw-bold">20200</td>
                  </tr>
                  <tr>
                    <td>deposit</td>
                    <td></td>
                    <td></td>
                    <td>6000</td>
                  </tr>
                </tbody>
                <tfoot>
                  <tr>
                    <td></td>
                    <td></td>
                    <td class="fw-bold">Current Due</td>
                    <td class="fw-bold">14200</td>
                  </tr>
                </tfoot>
              </table>
            </div>

            <div class="d-flex justify-content-between gap-4 mt-5">
              <div class="text-center flex-fill">
                <div class="border-top border-dark pt-2">Buyer Signature</div>
              </div>
              <div class="text-center flex-fill">
                <div class="border-top border-dark pt-2">Seller Signature</div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </main>

  </body>
</html>
