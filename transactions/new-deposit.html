<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Deposit</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f0fdf4, #dbeafe);
      }

      .deposit-card {
        max-width: 760px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card deposit-card p-4 p-md-5">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                  <h1 class="h2 fw-bold mb-1">New Deposit</h1>
                  <p class="text-muted mb-0">Enter deposit details below.</p>
                </div>
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  onclick="window.location.href = '../clients/client-summary.html'"
                >
                  Back
                </button>
              </div>

              <form id="deposit-form">
                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label for="date" class="form-label">Date</label>
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="date"
                      placeholder="DD/MM/YY"
                      value="10/12/25"
                    />
                  </div>

                  <div class="col-12 col-md-4">
                    <label for="description" class="form-label">Description</label>
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="description"
                      placeholder="Enter description"
                      value="By Cash"
                    />
                  </div>

                  <div class="col-12 col-md-4">
                    <label for="taka" class="form-label">Taka</label>
                    <input
                      type="number"
                      class="form-control form-control-lg"
                      id="taka"
                      placeholder="Enter amount"
                      value="10000"
                    />
                  </div>
                </div>

                <div class="d-flex justify-content-end mt-4">
                  <button type="submit" class="btn btn-success btn-lg">
                    Save Deposit
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    ></script>
    <script>
      const depositForm = document.getElementById("deposit-form");

      depositForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const depositData = {
          date: document.getElementById("date").value,
          description: document.getElementById("description").value,
          taka: document.getElementById("taka").value,
        };

        localStorage.setItem("shopDepositData", JSON.stringify(depositData));
        window.location.href = "../clients/client-summary.html";
      });
    </script>
  </body>
</html>
