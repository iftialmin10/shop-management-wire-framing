<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Deposit</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #dbeafe);
      }

      .edit-card {
        max-width: 760px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card edit-card p-4 p-md-5">
            <div class="card-body">
              <div class="mb-4">
                <div class="d-flex justify-content-between align-items-start gap-3">
                  <div>
                    <h1 class="h2 fw-bold mb-1">Edit Deposit</h1>
                    <p class="text-muted mb-0">
                      Update the deposit information below.
                    </p>
                  </div>
                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    onclick="window.location.href = '../clients/client-summary.html'"
                  >
                    Back
                  </button>
                </div>
              </div>

              <form id="edit-deposit-form">
                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label for="deposit-date" class="form-label">Date</label>
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="deposit-date"
                      placeholder="Enter date"
                    />
                  </div>

                  <div class="col-12 col-md-4">
                    <label for="deposit-description" class="form-label"
                      >Description</label
                    >
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="deposit-description"
                      placeholder="Enter description"
                    />
                  </div>

                  <div class="col-12 col-md-4">
                    <label for="deposit-taka" class="form-label">Taka</label>
                    <input
                      type="number"
                      class="form-control form-control-lg"
                      id="deposit-taka"
                      placeholder="Enter taka"
                    />
                  </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-4">
                  <button
                    type="button"
                    class="btn btn-outline-danger btn-lg"
                    id="delete-deposit-btn"
                  >
                    Delete
                  </button>
                  <button type="submit" class="btn btn-success btn-lg">
                    Save
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1N7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const defaultDepositData = {
        date: "10/12/25",
        description: "By Cash",
        taka: "10000",
      };

      const depositData = JSON.parse(
        localStorage.getItem("shopDepositData") || "{}",
      );

      document.getElementById("deposit-date").value =
        depositData.date || defaultDepositData.date;
      document.getElementById("deposit-description").value =
        depositData.description || defaultDepositData.description;
      document.getElementById("deposit-taka").value =
        depositData.taka || defaultDepositData.taka;

      document
        .getElementById("edit-deposit-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();

          const updatedDepositData = {
            date: document.getElementById("deposit-date").value,
            description: document.getElementById("deposit-description").value,
            taka: document.getElementById("deposit-taka").value,
          };

          localStorage.setItem("shopDepositData", JSON.stringify(updatedDepositData));
          window.location.href = "../clients/client-summary.html";
        });

      document.getElementById("delete-deposit-btn").addEventListener("click", () => {
        localStorage.removeItem("shopDepositData");
        window.location.href = "../clients/client-summary.html";
      });
    </script>
  </body>
</html>
