<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Cement Expense</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc, #dcfce7);
      }

      .edit-card {
        max-width: 760px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card edit-card p-4 p-md-5">
            <div class="card-body">
              <div class="mb-4">
                <div
                  class="d-flex justify-content-between align-items-start gap-3"
                >
                  <div>
                    <h1 class="h2 fw-bold mb-1">Edit Cement Expense</h1>
                    <p class="text-muted mb-0">
                      Update the cement purchase details below.
                    </p>
                  </div>
                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    onclick="
                      window.location.href = '../clients/client-summary.html'
                    "
                  >
                    Back
                  </button>
                </div>
              </div>

              <form id="edit-cement-form">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label for="cement-brand" class="form-label"
                      >cement brand</label
                    >
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="cement-brand"
                      placeholder="Enter cement brand"
                      readonly
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="price-per-packet" class="form-label"
                      >price/bag</label
                    >
                    <input
                      type="number"
                      class="form-control form-control-lg"
                      id="price-per-packet"
                      placeholder="Enter price per packet"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="cement-category" class="form-label"
                      >cement category</label
                    >
                    <select class="form-select form-select-lg" id="cement-category">
                      <option selected>BM</option>
                      <option>AM</option>
                      <option>OPC</option>
                    </select>
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="total-cement-bag" class="form-label"
                      >total cement bag</label
                    >
                    <input
                      type="number"
                      class="form-control form-control-lg"
                      id="total-cement-bag"
                      placeholder="Enter total cement bag"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="total-price" class="form-label"
                      >total price</label
                    >
                    <input
                      type="number"
                      class="form-control form-control-lg"
                      id="total-price"
                      placeholder="Enter total price"
                      readonly
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="other-expense" class="form-label"
                      >other expense</label
                    >
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="other-expense"
                      placeholder="Enter other expense"
                      value="Carrying cost"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="other-expense-cost" class="form-label">
                      other expense cost
                    </label>
                    <input
                      type="number"
                      class="form-control form-control-lg"
                      id="other-expense-cost"
                      placeholder="Enter other expense cost"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="cost" class="form-label">cost</label>
                    <input
                      type="number"
                      class="form-control form-control-lg"
                      id="cost"
                      placeholder="Enter cost"
                      readonly
                    />
                  </div>
                  <div class="col-12">
                    <div class="form-check form-switch">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        role="switch"
                        id="delivery-status"
                      />
                      <label class="form-check-label" for="delivery-status">
                        Delivery Status
                      </label>
                    </div>
                  </div>
                </div>

                <div
                  class="d-flex justify-content-between align-items-center mt-4"
                >
                  <button
                    type="button"
                    class="btn btn-outline-danger btn-lg"
                    id="delete-cement-btn"
                  >
                    Delete
                  </button>
                  <button type="submit" class="btn btn-success btn-lg">
                    Save
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1N7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const defaultCementData = {
        cementBrand: "Seven Rings",
        pricePerPacket: "450",
        cementCategory: "BM",
        totalCementBag: "40",
        totalPrice: "18000",
        otherExpense: "Carrying cost",
        otherExpenseCost: "500",
        cost: "18500",
      };

      const cementData = JSON.parse(
        localStorage.getItem("shopCementData") || "{}",
      );

      document.getElementById("cement-brand").value =
        cementData.cementBrand || defaultCementData.cementBrand;
      document.getElementById("price-per-packet").value =
        cementData.pricePerPacket || defaultCementData.pricePerPacket;
      document.getElementById("cement-category").value =
        cementData.cementCategory || defaultCementData.cementCategory;
      document.getElementById("total-cement-bag").value =
        cementData.totalCementBag || defaultCementData.totalCementBag;
      document.getElementById("total-price").value =
        cementData.totalPrice || defaultCementData.totalPrice;
      document.getElementById("other-expense").value =
        cementData.otherExpense && isNaN(Number(cementData.otherExpense))
          ? cementData.otherExpense
          : defaultCementData.otherExpense;
      document.getElementById("other-expense-cost").value =
        cementData.otherExpenseCost || defaultCementData.otherExpenseCost;
      document.getElementById("cost").value =
        cementData.cost || defaultCementData.cost;

      document
        .getElementById("edit-cement-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();

          const updatedCementData = {
            cementBrand: document.getElementById("cement-brand").value,
            pricePerPacket: document.getElementById("price-per-packet").value,
            cementCategory: document.getElementById("cement-category").value,
            totalCementBag: document.getElementById("total-cement-bag").value,
            totalPrice: document.getElementById("total-price").value,
            otherExpense: document.getElementById("other-expense").value,
            otherExpenseCost:
              document.getElementById("other-expense-cost").value,
            cost: document.getElementById("cost").value,
          };

          localStorage.setItem(
            "shopCementData",
            JSON.stringify(updatedCementData),
          );
          window.location.href = "../clients/client-summary.html";
        });

      document
        .getElementById("delete-cement-btn")
        .addEventListener("click", () => {
          localStorage.removeItem("shopCementData");
          window.location.href = "../clients/client-summary.html";
        });
    </script>
  </body>
</html>
