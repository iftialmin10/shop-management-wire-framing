<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Client</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
      }

      .edit-card {
        max-width: 760px;
        width: 100%;
        border: 0;
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 d-flex justify-content-center">
          <div class="card edit-card p-4 p-md-5">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                  <h1 class="h2 fw-bold mb-1">Edit Client</h1>
                  <p class="text-muted mb-0">Update the client information below.</p>
                </div>
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  onclick="window.location.href = 'client-summary.html'"
                >
                  Back
                </button>
              </div>

              <form id="edit-client-form">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label for="name" class="form-label">Name</label>
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="name"
                      placeholder="Enter client name"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="phone" class="form-label">Phone</label>
                    <input
                      type="tel"
                      class="form-control form-control-lg"
                      id="phone"
                      placeholder="Enter phone number"
                    />
                  </div>

                  <div class="col-12">
                    <label for="address" class="form-label">Address</label>
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="address"
                      placeholder="Enter client address"
                    />
                  </div>

                  <div class="col-12">
                    <label for="reference" class="form-label">Reference</label>
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="reference"
                      placeholder="Enter reference details"
                    />
                  </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-4">
                  <button
                    type="button"
                    class="btn btn-outline-danger btn-lg"
                    id="delete-client-btn"
                  >
                    Delete
                  </button>
                  <button type="submit" class="btn btn-primary btn-lg">
                    Save
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1N7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const defaultClientData = {
        name: "Abdul Motin",
        phone: "01999999",
        address: "Rampura",
        reference: "Mia, Kazipara",
      };

      const clientData = JSON.parse(
        localStorage.getItem("shopClientData") || "{}",
      );

      document.getElementById("name").value = clientData.name || defaultClientData.name;
      document.getElementById("phone").value = clientData.phone || defaultClientData.phone;
      document.getElementById("address").value =
        clientData.address || defaultClientData.address;
      document.getElementById("reference").value =
        clientData.reference || defaultClientData.reference;

      const editClientForm = document.getElementById("edit-client-form");
      editClientForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const updatedClientData = {
          name: document.getElementById("name").value,
          phone: document.getElementById("phone").value,
          address: document.getElementById("address").value,
          reference: document.getElementById("reference").value,
        };

        localStorage.setItem("shopClientData", JSON.stringify(updatedClientData));
        window.location.href = "client-summary.html";
      });

      document.getElementById("delete-client-btn").addEventListener("click", () => {
        localStorage.removeItem("shopClientData");
        window.location.href = "client-history.html";
      });
    </script>
  </body>
</html>
